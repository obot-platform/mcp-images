name: Build and Push Snowflake Image

on:
  push:
    branches: [ snowflake ]
    paths:
      - 'Dockerfile.snowflake'
      - '.github/workflows/build-snowflake.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/snowflake-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image (no cache)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.snowflake
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
        no-cache: true
        build-args: |
          SNOWFLAKE_MCP_REPO=https://github.com/obot-platform/snowflake-mcp.git
          SNOWFLAKE_MCP_COMMIT=main

    - name: Image digest
      run: echo ${{ steps.build.outputs.digest }} 