images:
  - name: antv-charts
    type: node
    package: "@antv/mcp-server-chart"
    version: 0.9.10
  - name: aws-api
    type: python
    package: awslabs.aws-api-mcp-server
    version: 1.3.26
  - name: aws-documentation
    type: python
    package: awslabs.aws-documentation-mcp-server
    version: 1.1.20
  - name: aws-eks
    type: python
    package: awslabs.eks-mcp-server
    version: 0.1.27
  - name: aws-kendra
    type: python
    package: awslabs.amazon-kendra-index-mcp-server
    version: 1.0.15
  - name: aws-redshift
    type: python
    package: awslabs.redshift-mcp-server
    version: 0.0.20
  - name: azure
    type: node
    package: "@azure/mcp"
    version: 1.0.3
  - name: browserbase
    type: node
    package: "@browserbasehq/mcp-server-browserbase"
    version: 2.4.3
  - name: chroma
    type: python
    package: chroma-mcp
    version: 0.2.6
  - name: context7
    type: node
    package: "@upstash/context7-mcp"
    version: 2.1.7
  - name: datadog
    type: node
    package: "@winor30/mcp-server-datadog"
    version: 1.7.0
  - name: duckduckgo-search
    type: python
    package: duckduckgo-mcp-server
    version: 0.1.2
  - name: exa-search
    type: node
    package: exa-mcp-server
    version: 3.2.0
  - name: firecrawl
    type: node
    package: firecrawl-mcp
    version: 3.14.1
  - name: files-com
    type: python
    package: files-com-mcp
    version: 1.0.42
  - name: gitlab
    type: node
    package: "@zereight/mcp-gitlab"
    version: 2.0.36
  - name: grafana
    type: docker
    package: "mcp/grafana"
    version: latest
  - name: mongodb-atlas
    type: node
    package: mongodb-mcp-server
    version: 1.9.0
  - name: mongodb-database
    type: node
    package: mongodb-mcp-server
    version: 1.9.0
  - name: mysql-mcp-server
    type: python
    package: mysql-mcp-server
    version: 0.2.2
  - name: pagerduty
    type: python
    package: pagerduty-mcp
    version: 0.17.0
  - name: playwright
    type: node
    package: "@playwright/mcp"
    version: 0.0.70
  - name: postgresql
    type: python
    package: postgres-mcp
    version: 0.3.0
  - name: supabase
    type: node
    package: "@supabase/mcp-server-supabase"
    version: 0.7.0
  - name: digitalocean
    type: node
    package: "@digitalocean/mcp"
    version: 1.0.42
  - name: markitdown-mcp
    type: python
    package: markitdown-mcp
    version: 0.0.1a4
    constraints:
      - "mammoth~=1.11.0"
  - name: brave-search
    type: node
    package: "@brave/brave-search-mcp-server"
    version: 2.0.75
  - name: dynatrace
    type: node
    package: "@dynatrace-oss/dynatrace-mcp-server"
    version: 1.7.6
  - name: redis
    type: python
    package: redis-mcp-server
    version: 0.5.0
  - name: terraform
    type: docker
    package: hashicorp/terraform-mcp-server
    version: 0.5.1
